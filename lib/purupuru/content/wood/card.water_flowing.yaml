  hoverCueId: cue.card_hover.water_ripple
balance:
  rarity: uncommon
  powerBand: medium
  maxCopies: 2
  minDay: 1
  tags:
    - zone_activation
    - cross_element
constraints:
  approvalTier: core
  presentationMayMutateGameState: false
  globalWeatherAllowed: false
  multiFocusAllowed: false
  notes:
    - Water daemon card — Ruan's drifting current. Cross-element play in the
      wood slice; targets the wood grove for now.
