name: effect-substrate
description: |
  How to organize a TypeScript app around the ECS ≡ Effect ≡ Hexagonal
  Architecture isomorphism. Names the four-folder pattern (domain ·
  ports · live · mock), the suffix-as-type discipline that makes
  behavior surfaces grep-enumerable for AI agents, and the
  delete-heavy refactor recipe.
status: candidate
version: 0.1.0
authors:
  - zksoju
provenance:
  origin_cycle: compass-substrate-ecs-2026-05-11
  validated_in:
    - compass (2026-05-11) — net -1236 LOC · 128/128 tests · ONE Effect.provide site
  promotion_criteria:
    - validated_in needs >= 3 projects to move to status:active
    - one project must be a non-Next.js TS application
tags:
  - effect
  - ecs
  - hexagonal-architecture
  - ports-and-adapters
  - typescript
  - refactor-pattern
composes_with:
  - the-arcade (OSTROM architecture lens)
  - artisan (ALEXANDER craft lens)
references:
  - https://effect.website/docs/requirements-management/services/
  - https://effect.website/docs/requirements-management/layers/
  - https://alistair.cockburn.us/hexagonal-architecture/
  - https://programmingisterrible.com/post/139222674273/how-to-write-disposable-code-in-large-systems
forbidden_context:
  - This pack is a doctrine, not an app framework. It does not generate code.
  - It does not prescribe Effect-everywhere — only at service boundaries.
  - Suffix discipline is the contract; the language choice (Effect, fp-ts,
    plain TS) is downstream.
