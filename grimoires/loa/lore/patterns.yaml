- id: substrate-as-architectural-answer
  term: Substrate as Architectural Answer
  short: >-
    A bug class that resists patches at every layer can sometimes be routed
    AROUND by building a verification substrate at the boundary, rather than
    fixed at any individual layer. The substrate doesn't solve the bug; it
    makes the bug optional.
  context: >-
    Cycle-102 spent three sprints chasing the empty-content failure mode of
    reasoning-class models on large adversarial-review prompts. T1.9 (Sprint 1A)
    fixed the user-facing layer at 10K tokens. T1B.4 (Sprint 1B) swapped the
    model from gpt-5.5-pro to claude-opus-4-7, which had no documented
    empty-content bug. Sprint 1C BB iter-1 review against the 1935-line diff
    revealed claude-opus-4-7 ALSO empty-contents at >40K input on review-type
    prompts (vision-024 substrate-speaks-twice — the bug class manifesting
    one layer wider). The architectural answer was not a third model swap.
    The architectural answer was Sprint 1C itself: the curl-mock harness
    substrate that lets adapter behavior be verified via execution-level
    proof rather than via adversarial-review. Future T1.7 redaction-leak
    closure will be tested via the harness, not via opus-on-large-diff.
    The bug class doesn't disappear — it just stops being load-bearing.
    This is the third posture in the framework's quality-gate evolution:
    fail-loud (vision-019), surface at successively wider zoom levels
    (vision-024), build substrates such that some layers don't need to ask
    the model to verify (vision-025). Multiple complementary verification
    substrates are stronger than any single substrate at any single scale,
    mirroring the testing-pyramid lesson at framework-quality-gate scale.
  source:
    cycle: "cycle-102-model-stability"
    sprint: "Sprint 1C — curl-mock harness"
    visions: ["vision-024", "vision-025"]
    upstream_issues: ["#823 (the bug class still exists)", "#808 (the substrate that obviates it)"]
    date: "2026-05-10"
  tags:
    - substrate
    - quality-gates
    - fractal-degradation
    - architectural-answer
    - foundational
    - pattern
  status: Active
  challenges:
    - "Recognizing when a bug class is fractal vs fixable. Premature substrate-building when a patch would do is overkill; persistent patching when substrate is needed is the trap vision-023 named."
    - "Substrates have their own scope limits. The curl-mock harness covers adapter-payload verification but not novel architectural decisions — those still need adversarial-review, which still empty-contents at scale."
  lineage:
    - vision-019  # fail-loud
    - vision-023  # fractal recursion
    - vision-024  # substrate speaks twice
  superseded_by: null
  related:
    - operator-gift-as-mechanism
