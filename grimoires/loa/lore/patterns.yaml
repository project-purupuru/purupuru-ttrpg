- id: soul-identity-doc
  term: SOUL
  short: >-
    A schema-validated descriptive-identity document at project root
    (SOUL.md), surfaced via SessionStart hook through prompt-injection
    sanitization. Required sections (What I am / not / Voice / Discipline /
    Influences) force the document to be DESCRIPTIVE. Prescriptive section
    rejection at the schema layer prevents drift back into CLAUDE.md
    territory.
  context: >-
    The SOUL is the project's answer to "who are you?" — read at every
    session start so agents and operators absorb identity context before
    doing work. The five required sections are deliberately Plutarchian:
    they ask not just what the project does, but what it refuses (What I
    am not), how it speaks (Voice), what it values (Discipline), and what
    formed it (Influences). The Refusals section captures concrete "no"s
    — failures the project will not relitigate. The schema enforces this
    shape; the hook surfaces it under <untrusted-content> markers so the
    body cannot smuggle prescriptive instructions past the descriptive
    framing. cycle-098 L7 ships this as the foundation; the adversarial
    jailbreak corpus (50+ vectors covering role-switch, indirect Markdown
    injection, Unicode obfuscation, encoded payloads, multi-turn
    conditioning) is deferred to its own cycle because curating attack
    vectors is qualitatively different work from shipping the lib + hook.
  source:
    cycle: "cycle-098-agent-network"
    sprint: "Sprint 7 (L7 soul-identity-doc — foundation)"
    rfc: "https://github.com/0xHoneyJar/loa/issues/659"
