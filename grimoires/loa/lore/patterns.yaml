- id: descriptive-identity
  term: Descriptive Identity
  short: >-
    The "what I am / what I am not / voice / discipline / influences" layer
    of project documentation, distinct from the prescriptive rules layer.
    Descriptive identity tells you what a project IS; prescriptive rules
    tell you what the agent MUST DO. Mixing them collapses the boundary
    that makes both useful.
  context: >-
    cycle-098 L7 ships SOUL.md as the descriptive complement to CLAUDE.md.
    The schema enforces the boundary in two directions: prescriptive section
    patterns (^MUST, ^ALWAYS, ^NEVER, rule tables) are rejected at validation
    time, and the body is wrapped in `<untrusted-content source="L7">`
    markers at SessionStart surfacing time so the agent treats it as
    DESCRIPTIVE context rather than INSTRUCTIONS. The boundary matters
    because identity statements drift toward rules when authors are
    unsupervised — "we value testing" becomes "MUST run tests" — and the
    rules layer drifts toward identity when authors want to capture *why*
    a rule exists. Two separate files with two separate schemas + surface
    paths keeps each layer load-bearing for its own purpose. The pattern
    generalizes beyond agent docs: open-source projects benefit from
    distinguishing CONTRIBUTING.md (prescriptive) from VALUES.md or
    CHARTER.md (descriptive). Inversely, identity docs that describe
    *only* aspirations without surfacing them at session-start are
    expensive to author and never read.
  source:
    cycle: "cycle-098-agent-network"
    sprint: "Sprint 7 (L7 soul-identity-doc)"
    rfc: "https://github.com/0xHoneyJar/loa/issues/659"
    date: "2026-05-08"
