aesthetic: >
  The sky is real. Somewhere a fault line shifted and a solar flare arced, and
  tomorrow your lineup means something different because of it. The meta is not
  a thing a designer balances — it is weather, sourced from the actual planet
  through the Five Oracles, and nobody controls it, and you can't buy it. This
  is what keeps the game honest forever: no strategy can dominate, because the
  ground itself moves before anyone finishes solving it. Everyone knows what
  day it is. The skill is in adapting, not in cracking.
