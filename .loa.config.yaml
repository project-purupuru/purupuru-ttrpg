# Loa Framework Configuration
persistence_mode: standard
integrity_enforcement: strict
drift_resolution: code

disabled_agents: []

memory:
  notes_file: grimoires/loa/NOTES.md
  trajectory_dir: grimoires/loa/a2a/trajectory
  trajectory_retention_days: 30
  auto_restore: true

edd:
  enabled: true
  min_test_scenarios: 3
  trajectory_audit: true
  require_citations: true

compaction:
  enabled: true
  threshold: 5

integrations:
  - github

# Hackathon-mode interview tuning — 4-day Solana Frontier ship clock
interview:
  mode: minimal
  pacing: batch
  backpressure:
    no_infer: true
    show_work: true
    min_confirmation_questions: 1
  phase_gates:
    between_phases: false
    before_generation: true

# Run mode — autonomous sprint execution
run_mode:
  enabled: true
  defaults:
    max_cycles: 20
    timeout_hours: 8
  sprint_plan:
    branch_prefix: "feature/"
    default_branch_name: "observatory-v0"
    consolidate_pr: true
    commit_prefix: "feat"
    include_commits_by_sprint: true

# Simstim — HITL accelerated workflow (PRD → SDD → Sprint → Implementation)
# Enabled 2026-05-09 for indexer sprint-2 Flatline gate
simstim:
  enabled: true
  bridgebuilder_design_review: true   # Phase 3.5 active
  flatline:
    beads_loop: false                 # Phase 6.5 off · 4d clock

# Flatline Protocol — multi-model adversarial review
# Enabled 2026-05-09 for indexer sprint-2 Flatline gate (sprint plan + amendments)
# Auto-trigger left off — manual invocation via /flatline-review only
# 2026-05-13 PM (cycle-1): route model-adapter through cheval (model-invoke).
# Without this, model-adapter.sh sends headless aliases (codex-headless etc) directly
# to OpenAI API which rejects them with "model does not exist".
# CLAUDE.md says default is true post-cycle-107 but code default is false.
hounfour:
  flatline_routing: true

flatline_protocol:
  enabled: true
  auto_trigger: false
  # 2026-05-13 PM (cycle-1): auth degraded — anthropic credits exhausted, google project 403.
  # Routing all 3 voices through codex-headless (only working path) for infrastructure validation.
  # Manual Opus voice supplied via Claude Code session (this conversation) as second adversarial voice.
  # Restore Anthropic + Google auth to return to multi-model adversarial config.
  models:
    primary: codex-headless
    secondary: codex-headless
    tertiary: codex-headless

# ─────────────────────────────────────────────────────────────────────────
# Run Bridge · Autonomous Excellence Loop (added 2026-05-07 PM)
# ─────────────────────────────────────────────────────────────────────────

run_bridge:
  enabled: true
  defaults:
    depth: 3
    per_sprint: false  # full plan mode · iterate at plan-level
    flatline_threshold: 0.05
    consecutive_flatline: 2
  timeouts:
    per_iteration_hours: 4
    total_hours: 24
  github_trail:
    post_comments: true
    update_pr_body: true
  ground_truth:
    enabled: true
  vision_registry:
    enabled: true
    auto_capture: true
  rtfm:
    enabled: false  # docs not v0 critical
  lore:
    enabled: true
    categories:
      - mibera
      - neuromancer

# ─────────────────────────────────────────────────────────────────────────
# Run Mode · /run sprint-plan autonomous execution (added 2026-05-07 PM)
# ─────────────────────────────────────────────────────────────────────────

run_mode:
  enabled: true
  defaults:
    max_cycles: 20
    timeout_hours: 8
  sprint_plan:
    branch_prefix: "feat/"
    default_branch_name: "awareness-layer-spine"
    consolidate_pr: true
    commit_prefix: "feat"
    include_commits_by_sprint: true
