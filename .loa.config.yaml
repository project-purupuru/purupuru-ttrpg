# Loa Framework Configuration
persistence_mode: standard
integrity_enforcement: strict
drift_resolution: code

disabled_agents: []

memory:
  notes_file: grimoires/loa/NOTES.md
  trajectory_dir: grimoires/loa/a2a/trajectory
  trajectory_retention_days: 30
  auto_restore: true

edd:
  enabled: true
  min_test_scenarios: 3
  trajectory_audit: true
  require_citations: true

compaction:
  enabled: true
  threshold: 5

integrations:
  - github

# Hackathon-mode interview tuning — 4-day Solana Frontier ship clock
interview:
  mode: minimal
  pacing: batch
  backpressure:
    no_infer: true
    show_work: true
    min_confirmation_questions: 1
  phase_gates:
    between_phases: false
    before_generation: true

# ─────────────────────────────────────────────────────────────────────────
# Flatline Protocol + Hounfour subscription routing (added 2026-05-07 PM)
# Mirrors bonfire's working config · enables 3-model adversarial review
# via Codex + Claude + Gemini headless subscription auth (no API keys).
# Auth setup verified: codex login · claude /login · gemini interactive run.
# ─────────────────────────────────────────────────────────────────────────

flatline_protocol:
  enabled: true
  auto_trigger: false  # manual via /flatline-review · simstim Phase 2/4/6 invoke explicitly
  models:
    # Forward-compat names that AREN'T in cheval's built-in registry · this forces
    # the model-adapter shim to fall through to hounfour.aliases below (which route
    # to subscription headless providers). Per bonfire's working pattern.
    primary: claude-opus-4-8       # → claude-headless:claude-opus-4-7
    secondary: gpt-5.4-codex       # → codex-headless:gpt-5.5
  max_iterations: 5
  knowledge:
    notebooklm:
      enabled: false

# Tertiary model (3-model Flatline · adds Gemini)
hounfour:
  flatline_tertiary_model: gemini-3.0-pro     # → gemini-headless:gemini-3.1-pro-preview
  flatline_routing: true                       # route through cheval (subscription path)

  # Forward-compat alias bridges → subscription headless providers
  # NOTE: flatline-readiness.sh will REPORT validation errors for these names
  # (they're not in cheval's built-in registered aliases) but actual flatline runs
  # work because model-adapter.sh shim falls through to these overrides.
  # This is bonfire's verified working pattern for subscription auth.
  aliases:
    reviewer: codex-headless:gpt-5.5
    reasoning: codex-headless:gpt-5.5
    deep-thinker: gemini-headless:gemini-3.1-pro-preview
    claude-opus-4-8: claude-headless:claude-opus-4-7
    gpt-5.4-codex: codex-headless:gpt-5.5
    gemini-3.0-pro: gemini-headless:gemini-3.1-pro-preview

  # Subscription-auth headless adapters (3 providers · zero per-token cost)
  providers:
    codex-headless:
      type: codex-headless
      read_timeout: 600.0
      models:
        gpt-5.5:
          capabilities: [chat, code]
          context_window: 400000
          token_param: max_completion_tokens
          pricing:
            input_per_mtok: 0
            output_per_mtok: 0
          extra:
            reasoning_effort: high

    claude-headless:
      type: claude-headless
      read_timeout: 600.0
      models:
        claude-opus-4-7:
          capabilities: [chat, tools, function_calling, thinking_traces]
          context_window: 200000
          pricing:
            input_per_mtok: 0
            output_per_mtok: 0
          extra:
            effort: high
        claude-sonnet-4-6:
          capabilities: [chat, tools, function_calling]
          context_window: 200000
          pricing:
            input_per_mtok: 0
            output_per_mtok: 0

    gemini-headless:
      type: gemini-headless
      read_timeout: 600.0
      models:
        gemini-3.1-pro-preview:
          capabilities: [chat, code, thinking_traces]
          context_window: 1000000
          pricing:
            input_per_mtok: 0
            output_per_mtok: 0
        gemini-3-flash-preview:
          capabilities: [chat]
          context_window: 1000000
          pricing:
            input_per_mtok: 0
            output_per_mtok: 0

# ─────────────────────────────────────────────────────────────────────────
# Advanced features · simstim Phase 3.5 / 4.5 / 6.5 / 7.5
# ─────────────────────────────────────────────────────────────────────────

# Bridgebuilder design review (simstim Phase 3.5 · architectural SDD audit)
bridgebuilder_design_review:
  enabled: true
  lore_enabled: true
  vision_capture: true
  rework_count_max: 2

# Red Team (simstim Phase 4.5 · adversarial SDD security audit)
red_team:
  enabled: true
  simstim:
    auto_trigger: false  # opt-in per cycle (4d clock favors opt-in)

# Post-PR validation (Phase 7.5 · fresh-eyes loop after first PR)
post_pr_validation:
  enabled: true
  phases:
    audit:
      enabled: true
      max_iterations: 5
      min_severity: "medium"
    context_clear:
      enabled: true
      write_checkpoint: true
    e2e:
      enabled: true
      max_iterations: 3
    flatline:
      enabled: true
      mode: "hitl"
    bridgebuilder_review:
      enabled: true
  auto_invoke:
    enabled: true
    mode: "autonomous"

# Vision Registry (cross-cycle architectural learning)
vision_registry:
  enabled: true
  shadow_mode: true   # silent logging · graduate to active after 3 cycles
  status_filter: ["Captured", "Exploring"]
  min_tag_overlap: 2
  max_visions_per_session: 3
  propose_requirements: false  # off by default · enable post-shadow

# simstim · explicit sub-phase enables (bridgebuilder + flatline-beads loop)
simstim:
  enabled: true
  bridgebuilder_design_review: true   # Phase 3.5 active
  flatline:
    beads_loop: false                 # Phase 6.5 off · 4d clock
