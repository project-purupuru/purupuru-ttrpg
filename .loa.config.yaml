# Loa Configuration
# Active: Eval Sandbox (#277)

simstim:
  enabled: true
  bridgebuilder_design_review: true   # Phase 3.5 gate — enabled for cycle-048
  flatline:
    auto_accept_high_consensus: true
    show_disputed: true
    show_blockers: true
    beads_loop: true                    # Phase 6.5: Flatline Beads iterative refinement
    phases:
      - prd
      - sdd
      - sprint

run_mode:
  enabled: true
  defaults:
    max_cycles: 20
    timeout_hours: 8
  sprint_plan:
    branch_prefix: "feat/"
    default_branch_name: "platform-hardening-c015"
    consolidate_pr: true
    commit_prefix: "feat"
    include_commits_by_sprint: true

# Hounfour — Model-Heterogeneous Agent Routing (cycle-026)
hounfour:
  flatline_routing: false  # Route Flatline/GPT-review through model-invoke (cheval.py)
  flatline_tertiary_model: gemini-2.5-pro  # 3-model Flatline: Opus + GPT-5.3-codex + Gemini

  # Per-subsystem feature flags (all default true — opt-out)
  feature_flags:
    google_adapter: true     # Enable Google provider adapter
    deep_research: true      # Enable Deep Research models (Interactions API)
    flatline_routing: false   # Route Flatline through Hounfour (same as top-level)
    metering: true           # Enable BudgetEnforcer cost tracking
    thinking_traces: true    # Include thinking config in request bodies
    jam_geometry: false      # Enable Jam multi-model parallel review (opt-in)

  # Metering configuration
  metering:
    enabled: true
    ledger_path: .run/cost-ledger.jsonl
    budget:
      daily_micro_usd: 500000000  # $500/day default
      warn_at_percent: 80
      on_exceeded: downgrade      # block | downgrade | warn

# BUTTERFREEZONE — Cross-Repo Agent Legibility (cycle-017)
butterfreezone:
  ecosystem:
    - repo: 0xHoneyJar/loa-finn
      role: runtime
      interface: hounfour-router
      protocol: loa-hounfour@8.3.1
    - repo: 0xHoneyJar/loa-hounfour
      role: protocol
      interface: npm-package
      protocol: loa-hounfour@8.3.1
    - repo: 0xHoneyJar/arrakis
      role: distribution
      interface: jwt-auth
      protocol: loa-hounfour@8.3.1
  culture:
    naming_etymology: "Vodou terminology (Loa, Grimoire, Hounfour, Simstim) as cognitive hooks for agent framework concepts"
    principles:
      - "Think Before Coding — plan and analyze before implementing"
      - "Simplicity First — minimum complexity for the current task"
      - "Surgical Changes — minimal diff, maximum impact"
      - "Goal-Driven — every action traces to acceptance criteria"
    methodology: "Agent-driven development with iterative excellence loops (Simstim, Run Bridge, Flatline Protocol)"
    generative:
      description: "Creative methodology drawing from cyberpunk fiction, free jazz improvisation, and temporary autonomous zones"
      references:
        - "Neuromancer (Gibson) — Simstim as shared consciousness metaphor"
        - "Flatline Protocol — adversarial multi-model review as creative tension"
        - "TAZ (Hakim Bey) — temporary spaces for autonomous agent exploration"
      study_groups: "Knowledge production through collective inquiry — Flatline as multi-model study group"

# Vision Registry Integration (v1.42.0 — cycle-041)
# Weaves captured visions from bridge reviews into planning workflows.
# Disabled by default — opt-in via enabled: true.
vision_registry:
  enabled: true            # Graduated in cycle-069 (#486)
  shadow_mode: true        # Log matches silently before presenting to user
  shadow_cycles_before_prompt: 2  # Shadow cycles before graduation prompt
  status_filter:
    - Captured
    - Exploring
  min_tag_overlap: 2       # Minimum tag overlap for relevance
  max_visions_per_session: 3  # Cap visions shown per planning session
  ref_elevation_threshold: 3  # Ref count before lore elevation suggestion
  propose_requirements: false  # Experimental — vision-inspired requirement proposals
  bridge_auto_capture: false   # Auto-capture VISION findings from bridge reviews (cycle-042)

# Spiral Configuration (cycle-069 seed, cycle-070 e2e)
# Autonomous multi-cycle development loop.
spiral:
  enabled: true                    # Master switch for /spiral --start
  task: ""                         # Set dynamically by --start "task description"
  max_budget_per_cycle_usd: 15     # Per-cycle cost cap (3x Flatline + implement + review + audit)
  max_total_budget_usd: 50         # Spiral-level hard stop across all cycles
  status_file: ".run/spiral-status.txt"  # Human-readable status artifact
  seed:
    mode: "full"                   # "full" (Vision Registry queries), "degraded" (text-blob), "cold" (no context)
    default_tags:                  # Fallback tags when HARVEST sidecar has no mappable categories
      - architecture
      - security
    max_seed_visions: 10           # Max visions included in seed context
  step_timeouts:
    seed_sec: 30
    simstim_sec: 7200              # 2 hours per cycle dispatch
    harvest_sec: 60
  harness:                           # Evidence-gated orchestrator (cycle-071)
    enabled: true                    # Use harness vs monolithic dispatch
    max_phase_retries: 3             # Retries per gate on failure
    planning_budget_usd: 1           # Per-phase budget for PRD/SDD/Sprint
    implement_budget_usd: 5          # Budget for implementation session
    review_budget_usd: 2             # Budget for independent review session
    audit_budget_usd: 2              # Budget for independent audit session
    # Advisor Strategy: Sonnet executes (cheap), Opus judges (quality)
    # ~60% cost reduction vs all-Opus. See https://claude.com/blog/the-advisor-strategy
    executor_model: sonnet           # PRD, SDD, Sprint, Implementation
    advisor_model: opus              # Review, Audit (judgment quality)
    # Pipeline Profiles (cycle-072): full | standard | light
    pipeline_profile: standard       # Sprint Flatline only + Opus advisor ($12)

  # Off-Hours Scheduling (cycle-072)
  scheduling:
    enabled: false                   # Must opt-in
    windows:
      - start_utc: "02:00"
        end_utc: "08:00"
        days: [mon, tue, wed, thu, fri]
    strategy: fill                   # fill | single | continuous
    max_cycles_per_window: 3

# Prompt Isolation (v1.42.0 — cycle-042)
# De-authorization wrappers for untrusted content in LLM prompts.
# Addresses vision-003: Context Isolation as Prompt Injection Defense.
prompt_isolation:
  enabled: true                # Enable context isolation wrappers in prompt construction

# Continuous Learning — Skill Extraction (cycle-046)
continuous_learning:
  skills_dir: grimoires/loa/skills
  pending_dir: grimoires/loa/skills-pending
  archive_dir: grimoires/loa/skills-archived

run_bridge:
  enabled: true
  defaults:
    depth: 5
    per_sprint: false
    flatline_threshold: 0.05
    consecutive_flatline: 2
  bridgebuilder:
    persona_enabled: true
    persona_path: .claude/data/bridgebuilder-persona.md
    enriched_findings: true
    insights_stream: true
    praise_findings: true
    integrity_check: true
    token_budget:
      findings_tokens: 5000
      insights_tokens: 25000
      total_tokens: 30000
    size_limits:
      truncate_bytes: 66560
      findings_only_bytes: 262144
    redaction:
      enabled: true
      post_redaction_safety: true
    # Multi-model Bridgebuilder (cycle-052 PR #463 architecture)
    # Three-model kaironic review: Opus + GPT-5.3-codex + Gemini 2.5 Pro.
    # Consensus scoring + iterative convergence (findings stabilize → kaironic termination).
    # api_key_mode: graceful — missing keys degrade gracefully rather than blocking review.
    multi_model:
      enabled: true
      models:
        - provider: anthropic
          model_id: claude-opus-4-7
          role: primary
        - provider: openai
          model_id: gpt-5.3-codex
          role: reviewer
        - provider: google
          model_id: gemini-2.5-pro
          role: reviewer
      iteration_strategy: final
      api_key_mode: graceful
      consensus:
        enabled: true
        scoring_thresholds:
          high_consensus: 700
          disputed_delta: 300
          low_value: 400
          blocker: 700
  pipeline_self_review:
    enabled: false              # Default false — progressive rollout
    base_branch: main           # Branch to diff against

# Post-PR Validation — Amendment 1 enablement (cycle-053, Issue #467)
# The BRIDGEBUILDER_REVIEW phase runs after FLATLINE_PR, performs iterative
# adversarial review with kaironic termination. Feature enabled here for
# real-world observation per Option A from Issue #467 roadmap.
post_pr_validation:
  enabled: true
  phases:
    bridgebuilder_review:
      enabled: true              # ← Enabling Option A (was false default)
      auto_triage_blockers: true # Autonomous dispatch with logged reasoning (HITL decision #1)
      depth: 5                   # Inherit from /run-bridge default; kaironic short-circuit on FLATLINE

# Bridgebuilder Design Review (cycle-044)
bridgebuilder_design_review:
  enabled: true                 # Enabled for cycle-048 — progressive rollout (sole gate)
  persona_path: ".claude/data/bridgebuilder-persona.md"  # FR-5.2: configurable persona
  lore_enabled: true            # Load lore context for reviews
  vision_capture: true          # Capture VISION/SPECULATION to registry
  token_budget:                 # Inherits run_bridge.bridgebuilder defaults
    findings_tokens: 5000
    insights_tokens: 25000
    total_tokens: 30000         # Output budget only (input context is additional)

flatline_protocol:
  enabled: true
  auto_trigger: true
  phases:
    prd: true
    sdd: true
    sprint: true
  models:
    primary: opus
    secondary: gpt-5.3-codex
    tertiary: gemini-2.5-pro        # 3-model Flatline (also read from hounfour.flatline_tertiary_model)
  thresholds:
    high_consensus: 700
    disputed_delta: 300
    low_value: 400
    blocker_skeptic: 700
  max_iterations: 5
  # Phase 2.5: Adversarial cross-model review (PR #552 enforcement gate)
  # When enabled, `/review-sprint` and `/audit-sprint` invoke a cross-model
  # dissenter (gpt-5.3-codex by default) and produce adversarial-{review,audit}.json.
  # The PreToolUse:Write hook at .claude/hooks/safety/adversarial-review-gate.sh
  # blocks COMPLETED marker writes when enabled but the artifact is missing.
  # Emergency override: LOA_ADVERSARIAL_REVIEW_ENFORCE=false.
  code_review:
    enabled: true
    model: gpt-5.3-codex
    budget_cents: 150
    timeout_seconds: 60
  security_audit:
    enabled: true
    model: gpt-5.3-codex
    budget_cents: 150
    timeout_seconds: 60
  secret_scanning:
    patterns:
      - "AIzaSy[A-Za-z0-9_-]{33}"
  knowledge:
    local:
      enabled: true
      paths:
        - grimoires/loa/
        - .claude/protocols/
    notebooklm:
      enabled: false
      notebook_id: ""
  # Round-Robin Arbiter (cycle-070 FR-4)
  # Autonomous decision-making for DISPUTED/BLOCKER findings.
  # Replaces HITL prompts when SIMSTIM_AUTONOMOUS=1.
  autonomous_arbiter:
    enabled: true                      # Enabled cycle-070 — round-robin arbiter active in autonomous mode
    rotation:                          # Model rotation per Flatline phase
      - opus                           # PRD arbiter
      - gpt-5.3-codex                  # SDD arbiter
      - gemini-2.5-pro                 # Sprint arbiter
    fallback: "reject"                 # Conservative fallback when all models fail
    max_arbiter_tokens: 4000           # Token budget for arbiter response

# Red Team — Generative Adversarial Security Design (cycle-012)
red_team:
  enabled: true
  mode: standard
  models:
    attacker_primary: opus
    attacker_secondary: gpt-5.3-codex
    defender_primary: opus
    defender_secondary: gpt-5.3-codex
  defaults:
    attacks_per_model: 10
    depth: 1
    focus: null
  thresholds:
    confirmed_attack: 700
    theoretical: 400
    human_review_gate: 800
  budgets:
    quick_max_tokens: 50000
    standard_max_tokens: 200000
    deep_max_tokens: 500000
    max_attacks_total: 20
  early_stopping:
    saturation_threshold: 0.8
    min_novel_per_iteration: 2
  safety:
    prohibited_content: true
    mandatory_redaction: true
    retention_days_restricted: 30
    retention_days_internal: 90
    ci_artifact_scrubbing: true
  input_sanitization:
    injection_detection: true
    context_isolation: true
    secret_filtering: true
  surfaces_registry: .claude/data/attack-surfaces.yaml
  simstim:
    auto_trigger: true      # Enabled for cycle-048
    phase: post_sdd
  bridge:
    enabled: false
  # Compliance Gate Profiles — parameterized keyword extraction (cycle-046 FR-4)
  # The 'security' profile is the default. Additional profiles (accessibility,
  # performance) can be added following the same schema.
  compliance_gates:
    security:
      # Values are grep -E regex patterns. Use "." for single-char wildcard
      # (e.g., "Error.Handling" matches "Error Handling" and "Error-Handling").
      keywords:
        - Security
        - Authentication
        - Authorization
        - Validation
        - Error.Handling
        - Access.Control
        - Secrets
        - Encryption
        - Input.Sanitiz
      prompt_template: "security-comparison"  # Maps to get_evaluation_context() in compliance-lib.sh
  # Code-vs-Design gate — compares SDD security design to implemented code (cycle-045)
  code_vs_design:
    enabled: false                    # Default off — opt-in per FR-3
    max_cycles: 2                     # Circuit breaker: max re-implementation cycles
    skip_if_no_sdd: true             # Skip silently when no SDD exists
    severity_threshold: 700           # Only divergences >700 trigger re-implementation
    token_budget: 150000              # 150K token ceiling per invocation
