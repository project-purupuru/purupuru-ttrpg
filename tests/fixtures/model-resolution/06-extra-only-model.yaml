description: "Operator-added model in `model_aliases_extra` resolves identically across runtimes. Sprint 1D tests baseline alias resolution (`opus`); Sprint 2 extends to operator-added models."

# Sprint 1D query — known alias `opus` (baseline resolution).
sprint_1d_query:
  alias: "opus"

input:
  schema_version: 2
  framework_defaults:
    providers:
      anthropic:
        models:
          claude-opus-4-7: { capabilities: [chat], context_window: 200000 }
    aliases:
      opus: { provider: anthropic, model_id: claude-opus-4-7 }
  operator_config:
    # Sprint 2D fix: skill_models entry is required for the resolver to fire
    # against (skill, role) — without it, the expected stage 2 hit is unreachable.
    # BB iter-1 F8 fix: also added `extra_user.primary` pointing at the
    # `experimental-opus-vnext` model_aliases_extra entry so the fixture
    # actually exercises the operator-added-model resolution path it claims
    # to test in the description (not just baseline `opus` lookup).
    skill_models:
      flatline_protocol:
        primary: opus
      extra_user:
        primary: experimental-opus-vnext
    model_aliases_extra:
      experimental-opus-vnext:
        provider: anthropic
        model_id: claude-opus-4-8-experimental
        capabilities: [chat]

expected:
  resolutions:
    - skill: extra_user
      role: primary
      resolved_provider: anthropic
      resolved_model_id: claude-opus-4-8-experimental
      resolution_path:
        - { stage: 2, outcome: hit, label: stage2_skill_models, details: { alias: experimental-opus-vnext } }
    - skill: flatline_protocol
      role: primary
      resolved_provider: anthropic
      resolved_model_id: claude-opus-4-7
      resolution_path:
        - { stage: 2, outcome: hit, label: stage2_skill_models, details: { alias: opus } }
  cross_runtime_byte_identical: true
