description: "Minimal `.loa.config.yaml` (no operator overrides) → all defaults resolve cleanly. Sprint 1D tests baseline `tiny` alias; Sprint 2 extends to defaults-fallback (FR-3.9 stage 5)."

# Sprint 1D query — known alias `tiny` (baseline resolution).
sprint_1d_query:
  alias: "tiny"

input:
  schema_version: 2
  framework_defaults:
    providers:
      anthropic:
        models:
          claude-haiku-4-5-20251001: { capabilities: [chat], context_window: 200000 }
    aliases:
      tiny: { provider: anthropic, model_id: claude-haiku-4-5-20251001 }
    agents:
      # Sprint 2D fix: agents.<key> uses underscore-form `<skill_name>` per
      # SDD §1.4.2 + FR-3.9 stage 5 (`agents.<skill_name>.{model,default_tier}`).
      # Pre-fix this fixture had `flatline-reviewer` (hyphen) which doesn't
      # match the expected.skill `flatline_protocol`. Reconciled.
      # `default_tier: tiny` matches the only alias declared in this minimal
      # framework_defaults — reachable via the S5 permissive direct-alias
      # fallback when no tier_groups.mappings is declared.
      flatline_protocol: { default_tier: tiny }
  operator_config: {}

expected:
  resolutions:
    - skill: flatline_protocol
      role: primary
      resolved_provider: anthropic
      resolved_model_id: claude-haiku-4-5-20251001
      resolution_path:
        - { stage: 5, outcome: hit, label: stage5_framework_default, details: { alias: tiny } }
  cross_runtime_byte_identical: true
