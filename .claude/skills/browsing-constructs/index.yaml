name: browsing-constructs
version: "2.0.0"
description: Browse, search, and compose constructs from the network
user_invocable: true

triggers:
  - "/constructs"
  - "find a skill for"
  - "find a construct"
  - "I need help with"
  - "is there a construct that"
  - "what construct can"
  - "search constructs"

capabilities:
  model_tier: sonnet
  danger_level: safe
  effort_hint: small
  downgrade_allowed: true
  execution_hint: sequential
  requires:
    native_runtime: false
    tool_calling: true
    thinking_traces: false
    vision: false

inputs:
  - name: action
    type: string
    description: "Action: browse (default), search, compose, install, register, sync, status, auth"
    required: false
    default: "browse"
  - name: query
    type: string
    description: "Natural language query for search mode"
    required: false
  - name: slug
    type: string
    description: "Construct slug for install action"
    required: false

outputs:
  - name: constructs
    type: array
    description: "List of constructs from API response"
  - name: result
    type: object
    description: "Action result with success/error info"

zones:
  system: read
  state: write
  app: none
