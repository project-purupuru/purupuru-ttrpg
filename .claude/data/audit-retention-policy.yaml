# =============================================================================
# audit-retention-policy.yaml — cycle-098 Sprint 1 review remediation (CC-8)
#
# Per-primitive retention defaults for L1-L7 audit logs.
#
# Retention defines how long the rolling JSONL log is kept before compaction
# / archive / pruning. Schemas live in `.claude/data/trajectory-schemas/`;
# this file declares LIFECYCLE policy on top of the envelope schema.
#
# Source: SDD §1.4.1 (per-primitive log structure) + IMP-002 (envelope
# evolution) + CC-8 (retention metadata required at schema level).
# =============================================================================
schema_version: "1.0"

primitives:
  L1:
    log_basename: "panel-decisions.jsonl"
    description: "Jury-panel binding decisions + minority dissent"
    retention_days: 30
    archive_after_days: 30   # daily snapshot → grimoires/loa/audit-archive/<date>-L1.jsonl.gz
    chain_critical: true     # NFR-R7 hash-chain recovery applies
    git_tracked: false       # rolling log; snapshots are tracked

  L2:
    log_basename: "cost-budget-events.jsonl"
    description: "Cost ceiling allow/warn/halt events + reconciliation"
    retention_days: 90
    archive_after_days: 90
    chain_critical: true
    git_tracked: false

  L3:
    log_basename: "cycles.jsonl"
    description: "Cycle phase transitions + completion + errors"
    retention_days: 30
    archive_after_days: 30
    chain_critical: false
    git_tracked: false

  L4:
    log_basename: "trust-ledger.jsonl"
    description: "Trust grants, drops, force-grants, eligibility events. Immutable."
    retention_days: 365
    archive_after_days: null  # never archive; immutable across cycle archives
    chain_critical: true
    git_tracked: true          # append-only file in grimoires/loa/

  L5:
    log_basename: "cross-repo-status.jsonl"
    description: "Cross-repo read cache + partial-failure markers"
    retention_days: 7
    archive_after_days: 7
    chain_critical: false
    git_tracked: false

  L6:
    # cycle-098 Sprint 6: L6 has two surfaces. The audit log is JSONL like
    # the other primitives; the user-facing INDEX is markdown + git-tracked.
    log_basename: "handoff-events.jsonl"   # .run/handoff-events.jsonl (UNTRACKED, hash-chained)
    handoff_index_basename: "handoffs/INDEX.md"  # grimoires/loa/handoffs/ (TRACKED, markdown)
    description: "Handoff write/read/surface events (JSONL audit log) + user-facing markdown INDEX. INDEX is git-tracked; events log is rolling + snapshot-archived."
    retention_days: 90
    archive_after_days: 90
    chain_critical: false
    git_tracked: false

  L7:
    # cycle-098 Sprint 7 (optimist HIGH-1 remediation): the L7 audit log is
    # `.run/soul-events.jsonl` — JSONL, hash-chained, UNTRACKED, retention 30d
    # per SDD §5.13 `L7_soul_days: 30`. SOUL.md itself is the operator-
    # authored surface (TRACKED in git, no automated retention) and is
    # described in `soul_surface_basename` for clarity.
    log_basename: "soul-events.jsonl"
    soul_surface_basename: "SOUL.md"  # operator-authored content; not the audit log
    description: "L7 soul.surface / soul.validate audit events (JSONL audit log). The SOUL.md operator-authored surface is git-tracked; this entry describes the audit log itself."
    retention_days: 30
    archive_after_days: 30
    chain_critical: false
    git_tracked: false

  MODELINV:
    # cycle-102 Sprint 1 (T1.2 + T1.7): MODELINV is a peer of L1-L7 — the
    # model-invocation audit primitive. Powers vision-019's M1 silent-
    # degradation audit query. Hash-chained per SDD §4.4 (envelope schema
    # 1.2.0 additive bump from 1.1.0). chain_critical: true because the
    # silent-degradation count metric depends on continuous chain integrity
    # — a missing or corrupted entry could mask a degraded run.
    #
    # Sprint 1B carry-forward (T1.7 emitter wiring): cheval invoke()
    # end-of-call path emits model.invoke.complete envelopes here. Schema
    # at .claude/data/trajectory-schemas/model-events/model-invoke-complete
    # .payload.schema.json. Redaction contract for original_exception is
    # tracked as Sprint 1B T1B.1 (HIGH security per BB iter-5 FIND-005);
    # emitter-side redaction via lib/log-redactor.{sh,py} MUST land before
    # MODELINV writes go live.
    log_basename: "model-invoke.jsonl"
    description: "MODELINV model.invoke.complete / class.resolved / probe.cache.refresh audit events. cycle-102 sprint-1 (T1.2 schema) + sprint-1B (T1.7 emitter wiring + T1B.1 redaction contract)."
    retention_days: 30
    archive_after_days: 30
    chain_critical: true
    git_tracked: false

# -----------------------------------------------------------------------------
# Compaction guidance:
# -----------------------------------------------------------------------------
# - JSONL primitives (L1, L2, L3, L5): the daily snapshot job runs at 00:00 UTC;
#   it copies all entries with ts_utc < (now - retention_days) into a snapshot
#   file at grimoires/loa/audit-archive/<date>-<primitive>.jsonl.gz, then
#   truncates the rolling log to entries within retention.
# - Snapshots are signed (cycle-098 Sprint 6 — out of Sprint 1 scope).
# - L4 (trust-ledger): never compacted; rotated only on cycle-archive.
# - L6 (handoffs INDEX): archived per-handoff-entry, not bulk; entries flagged
#   as "archived" stay in INDEX with an archive_pointer field.
# - L7 (soul-events.jsonl): JSONL retention 30d (cycle-098 Sprint 7 fix —
#   was previously mis-described as SOUL.md retention; the operator-authored
#   SOUL.md is git-tracked and is operator-managed without automation).
#
# Recovery:
# - chain_critical: true means audit_recover_chain has snapshot-archive fallback.
#   See .claude/scripts/audit-envelope.sh:_audit_recover_from_snapshot.
