  # posture is identical (remote model, no side effects, no IAM/STS in v1).
  # The provider:model-id namespace deliberately distinguishes routing path
  # so cost-ledger entries and audit logs separate cleanly.
  #
  # Source: cycle-096 Sprint 1 FR-5 + Sprint 0 G-S0-2 probe-locked IDs.

  bedrock:us.anthropic.claude-opus-4-7:
    trust_level: high
    trust_scopes:
      data_access: none
      financial: none
      delegation: none
      model_selection: none
      governance: none
      external_communication: none
      context_access:
        architecture: full
        business_logic: full
        security: redacted
        lore: full
    execution_mode: remote_model
    capabilities:
