name: cycle-099 cross-runtime-diff (FR-3.9 6-stage resolver 3-way parity)

# cycle-099 Sprint 1D (T1.12) → Sprint 2D (T2.6 partial) → Sprint 2D.c
# (T2.6 TS port) — cross-runtime byte-equality gate per SDD §7.6.2.
#
# Sprint 1D shipped: alias-lookup-only subset across 3 runners.
# Sprint 2D.a+b shipped: Python + bash on the FR-3.9 6-stage shape.
# Sprint 2D.c shipped: TS port via Python+Jinja2 codegen — TS leg restored
#   to the byte-equality gate. All 3 runtimes (Python ↔ bash ↔ TS) MUST emit
#   byte-identical canonical JSON for every fixture.
#
# Mandatory gate: any divergence between any two runtimes causes the PR to
# fail with `[CROSS-RUNTIME-DIFF-FAIL]` + the specific diverged bytes.

on:
  pull_request:
    paths:
      - 'tests/fixtures/model-resolution/**'
      - 'tests/bash/golden_resolution.sh'
      - 'tests/bash/golden_resolution.bats'
      - 'tests/python/golden_resolution.py'
      - 'tests/typescript/golden_resolution.ts'
      - 'tests/integration/sprint-2D-resolver-parity.bats'
      - '.claude/scripts/generated-model-maps.sh'
      - '.claude/scripts/lib/model-resolver.sh'
      - '.claude/scripts/lib/model-resolver.py'
      - '.claude/scripts/lib/codegen/model-resolver.ts.j2'
      - '.claude/adapters/loa_cheval/codegen/emit_model_resolver_ts.py'
      - '.claude/skills/bridgebuilder-review/resources/lib/model-resolver.generated.ts'
      - '.claude/skills/bridgebuilder-review/package.json'
      - '.claude/skills/bridgebuilder-review/package-lock.json'
      - '.claude/data/trajectory-schemas/model-resolver-output.schema.json'
      - '.github/workflows/cross-runtime-diff.yml'

permissions:
  contents: read

concurrency:
  group: cycle099-sprint-1d-diff-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cross-runtime-diff:
    name: T2.6 cross-runtime 3-way byte-equality gate (Python ↔ bash ↔ TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.13'

      # PINNING: SHA verified against actions/setup-node v4.1.0 tag
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install 'pyyaml==6.0.2' 'jsonschema==4.23.0'

      - name: Install yq v4.52.4 (pinned + checksum verified)
        run: |
          set -euo pipefail
          local_yq=/usr/local/bin/yq
          expected_sha256='0c4d965ea944b64b8fddaf7f27779ee3034e5693263786506ccd1c120f184e8c'
          sudo wget -qO "$local_yq" https://github.com/mikefarah/yq/releases/download/v4.52.4/yq_linux_amd64
          echo "$expected_sha256  $local_yq" | sha256sum -c -
          sudo chmod +x "$local_yq"

      - name: Install BB skill node deps (provides tsx for TS runner)
        working-directory: .claude/skills/bridgebuilder-review
        # cypherpunk HIGH-1 (sprint-1D): --ignore-scripts disables npm
        # lifecycle hooks (preinstall RCE defense).
        run: npm ci --no-audit --no-fund --ignore-scripts

      - name: Run bash runner
        run: bash tests/bash/golden_resolution.sh > bash-out.jsonl

      - name: Run python runner
        run: python tests/python/golden_resolution.py > python-out.jsonl

      - name: Run TS runner
        # BB iter-2 F2: invoke from repo root via absolute path instead of
        # cd-and-relative-path. The cwd dance was brittle (any directory
        # restructure would silently break the relative paths). PROJECT_ROOT
        # in the TS runner is derived from `__dirname`, not cwd, so running
        # from repo root works identically.
        # Cypherpunk LOW-3: direct local-binary invocation (not `npx tsx`)
        # avoids npx network-fallback risk.
        run: |
          .claude/skills/bridgebuilder-review/node_modules/.bin/tsx \
              tests/typescript/golden_resolution.ts > typescript-out.jsonl

      - name: Verify 3-way byte-equality
        run: |
          set -euo pipefail
          echo "=== bash output ==="
          cat bash-out.jsonl
          echo "=== python output ==="
          cat python-out.jsonl
          echo "=== typescript output ==="
          cat typescript-out.jsonl
          if ! diff -u bash-out.jsonl python-out.jsonl > /tmp/bash-vs-python.diff; then
            echo "::error::[CROSS-RUNTIME-DIFF-FAIL] bash vs python diverge:"
            cat /tmp/bash-vs-python.diff
            exit 1
          fi
          echo "OK — bash == python (byte-equal)"
          if ! diff -u bash-out.jsonl typescript-out.jsonl > /tmp/bash-vs-ts.diff; then
            echo "::error::[CROSS-RUNTIME-DIFF-FAIL] bash vs typescript diverge:"
            cat /tmp/bash-vs-ts.diff
            exit 1
          fi
          echo "OK — bash == typescript (byte-equal)"
          if ! diff -u python-out.jsonl typescript-out.jsonl > /tmp/python-vs-ts.diff; then
            echo "::error::[CROSS-RUNTIME-DIFF-FAIL] python vs typescript diverge:"
            cat /tmp/python-vs-ts.diff
            exit 1
          fi
          echo "OK — python == typescript (byte-equal)"
          echo ""
          echo "✅ All 3 runtimes byte-identical ($(wc -l < bash-out.jsonl) lines)"

      - name: Verify output matches committed golden file
        run: |
          set -euo pipefail
          if [ ! -f tests/fixtures/model-resolution/_golden.cross-runtime.jsonl ]; then
            echo "::error::Committed golden file missing"
            exit 1
          fi
          if ! diff -u tests/fixtures/model-resolution/_golden.cross-runtime.jsonl bash-out.jsonl; then
            echo "::error::Runner output drifted from committed golden file"
            echo "Regenerate via: bash tests/bash/golden_resolution.sh > tests/fixtures/model-resolution/_golden.cross-runtime.jsonl"
            exit 1
          fi
          echo "OK — output matches committed golden file"

      - name: Validate output against JSON Schema
        run: |
          set -euo pipefail
          python - <<'PY'
          import json, sys
          from jsonschema import validate, ValidationError
          with open('.claude/data/trajectory-schemas/model-resolver-output.schema.json') as fh:
              schema = json.load(fh)
          errors = 0
          for runtime in ('bash', 'python', 'typescript'):
              path = f'{runtime}-out.jsonl'
              with open(path) as fh:
                  for lineno, line in enumerate(fh, start=1):
                      line = line.rstrip('\n')
                      if not line:
                          continue
                      try:
                          doc = json.loads(line)
                          validate(doc, schema)
                      except (json.JSONDecodeError, ValidationError) as exc:
                          msg = exc.msg if hasattr(exc, 'msg') else exc.message
                          print(f'::error::{runtime} line {lineno}: {msg}')
                          print(f'  on: {line}')
                          errors += 1
          if errors:
              sys.exit(1)
          print('OK — all 3 runners conform to model-resolver-output.schema.json')
          PY
